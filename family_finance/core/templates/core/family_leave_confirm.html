<!-- core/templates/core/family_leave_confirm.html -->
{% extends 'core/base.html' %}
{% block content %}
<h2>🚪 Выход из семьи</h2>

<div class="alert alert-warning">
    <p>Вы уверены, что хотите покинуть семью <strong>"{{ family.name }}"</strong>?</p>
    <p>После этого вы потеряете доступ к общим данным семьи.</p>
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Да, покинуть семью</button>
    <a href="{% url 'family_dashboard' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
